<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Truecaller UI</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>
<body>

  <div class="mobile">

    <!-- Status Bar -->
    <div class="status-bar">
      <span>9:41</span>

      <div class="status-icons">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
      </div>
    </div>

    <!-- Header -->
    <div class="header">
      <img
        class="logo"
        src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Truecaller_Logo.png"
        alt="Truecaller"
      />

      <img
        class="profile"
        src="https://i.pravatar.cc/100"
        alt="profile"
      />
    </div>

    <!-- Welcome -->
    <div class="welcome">
      <p>Welcome,</p>
      <h1>Alex</h1>
    </div>

    <!-- Search -->
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" placeholder="Search a number"/>
    </div>

    <!-- Recents -->
    <section class="section">
      <h2>Recents</h2>

      <div class="recent-card">

        <div class="recent-left">

          <div class="scam-icon">
            <i class="fa-solid fa-ban"></i>
          </div>

          <div class="recent-info">
            <h3>Scammer</h3>

            <div class="number-row">
              <i class="fa-solid fa-magnifying-glass"></i>
              <span>(833) •••••••</span>
              <span class="time">10:36 AM</span>
            </div>
          </div>

        </div>

        <i class="fa-solid fa-chevron-right arrow"></i>

      </div>
    </section>

    <!-- Discover -->
    <section class="section">
      <h2>Discover</h2>

      <div class="discover-grid">

        <div class="discover-card">
          <div class="discover-icon blue">
            <i class="fa-solid fa-user"></i>
          </div>
          <p>Who viewed<br/>my profile</p>
        </div>

        <div class="discover-card">
          <div class="discover-icon yellow">
            <i class="fa-solid fa-box-open"></i>
          </div>
          <p>SMS Filtering</p>
        </div>

        <div class="discover-card">
          <div class="discover-icon bell">
            <i class="fa-solid fa-envelope"></i>
          </div>
          <p>Announcements</p>
        </div>

        <div class="discover-card">
          <div class="discover-icon users">
            <i class="fa-solid fa-users"></i>
          </div>
          <p>Community</p>
        </div>

        <div class="discover-card">
          <div class="discover-icon chat">
            <i class="fa-solid fa-comment"></i>
          </div>
          <p>How to<br/>report calls</p>
        </div>

      </div>
    </section>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">

      <div class="nav-item active">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
      </div>

      <div class="nav-item">
        <i class="fa-regular fa-shield"></i>
        <span>Protect</span>
      </div>

      <div class="nav-item">
        <i class="fa-solid fa-wave-square"></i>
        <span>Assistant</span>
      </div>

      <div class="nav-item">
        <i class="fa-solid fa-crown"></i>
        <span>Premium</span>
      </div>

    </div>

  </div>

</body>
</html>
